<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cabling Logbook</title>

<style>
:root {
  --bg-color: #ffffff;
  --text-color: #000000;
  --border-color: #ccc;
  --input-bg: #ffffff;
  --input-border: #ccc;
  --section-bg: #f9f9f9;
  --button-hover: #e8e8e8;
}

body.dark-mode {
  --bg-color: #1e1e1e;
  --text-color: #e0e0e0;
  --border-color: #444;
  --input-bg: #2d2d2d;
  --input-border: #444;
  --section-bg: #2d2d2d;
  --button-hover: #3d3d3d;
}

* {
  color: var(--text-color);
}

body {
  font-family: Arial;
  max-width: 600px;
  margin: auto;
  padding: 20px;
  background-color: var(--bg-color);
  transition: background-color 0.3s, color 0.3s;
}

input, select, button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  font-size: 16px;
  background-color: var(--input-bg);
  border: 1px solid var(--input-border);
  color: var(--text-color);
  border-radius: 4px;
}

button {
  cursor: pointer;
  transition: background-color 0.2s;
}

button:hover {
  background-color: var(--button-hover);
}

input, select {
  box-sizing: border-box;
}

.entry {
  border: 1px solid var(--border-color);
  padding: 10px;
  margin-top: 10px;
  background-color: var(--section-bg);
  border-radius: 4px;
}

.entry-buttons {
  display: flex;
  gap: 5px;
  margin-top: 8px;
}

.entry-buttons button {
  flex: 1;
  width: auto;
  margin: 0;
  padding: 8px;
  font-size: 14px;
}

#signatureCanvas {
  border: 2px solid var(--border-color);
  display: block;
  margin: 10px 0;
  touch-action: none;
  background: var(--input-bg);
  cursor: crosshair;
  width: 100%;
  max-width: 400px;
  border-radius: 4px;
}

.signature-section {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid var(--border-color);
  background: var(--section-bg);
  border-radius: 4px;
}

.button-group {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.button-group button {
  flex: 1;
  width: auto;
  margin: 0;
}

.header-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.header-controls button {
  flex: 1;
  width: auto;
  margin: 0;
  padding: 8px;
  font-size: 14px;
}

.week-badge {
  background-color: #4CAF50;
  color: white;
  padding: 12px;
  border-radius: 4px;
  text-align: center;
  margin: 10px 0;
  font-weight: bold;
}

.edit-modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  overflow: auto;
}

.edit-modal-content {
  background-color: var(--bg-color);
  margin: 10% auto;
  padding: 20px;
  border: 1px solid var(--border-color);
  width: 90%;
  max-width: 400px;
  border-radius: 4px;
}

.edit-modal-content input, .edit-modal-content select {
  margin: 10px 0;
}

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.modal-buttons button {
  flex: 1;
  width: auto;
  margin: 0;
}

.close {
  color: var(--text-color);
  float: right;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
}

.close:hover {
  opacity: 0.7;
}

.status-message {
  padding: 10px;
  margin: 10px 0;
  border-radius: 4px;
  text-align: center;
  display: none;
}

.status-message.success {
  background-color: #4CAF50;
  color: white;
  display: block;
}

.status-message.error {
  background-color: #f44336;
  color: white;
  display: block;
}
</style>
</head>

<body>

<div class="header-controls">
  <button id="darkModeBtn" type="button">🌙 Dark Mode</button>
  <button id="exportBtn" type="button">📥 Export CSV</button>
  <button id="resetBtn" type="button">🔄 Reset All</button>
</div>

<h2>Cabling Logbook</h2>

<div id="statusMsg" class="status-message"></div>

<!-- Week Summary -->
<div class="week-badge">
  📅 Week Hours: <span id="weekHours">0</span> / 40
</div>

<!-- Details -->
<input id="name" placeholder="Your Name">
<input id="employer" placeholder="Employer">

<hr>

<!-- ✅ Auto date -->
<input id="date" type="date">
<input id="job" placeholder="Job">
<input id="work" placeholder="Work">
<input id="hours" type="number" placeholder="Hours">

<select id="cable">
  <option>Cat5e</option>
  <option>Cat6</option>
  <option>Cat6A</option>
</select>

<select id="task">
  <option>Cable Installation</option>
  <option>Terminate Outlets Field</option>
  <option>Terminate Outlets Rack</option>
  <option>Patching</option>
  <option>Testing/Certifying</option>
</select>

<button id="addBtn" type="button">Add Entry</button>

<h3>Total: <span id="total">0</span></h3>

<!-- ✅ SUPERVISOR SIGNATURE SECTION -->
<div class="signature-section">
  <h3>Supervisor Sign-Off</h3>
  <input id="supervisorName" placeholder="Supervisor Name">
  <input id="licenceNumber" placeholder="Licence Number">
  
  <p><b>Signature:</b></p>
  <canvas id="signatureCanvas" width="400" height="150"></canvas>
  
  <div class="button-group">
    <button id="clearSigBtn" type="button">🔄 Clear</button>
    <button id="saveSigBtn" type="button">✅ Save Signature</button>
  </div>
  <p id="sigStatus"></p>
</div>

<button id="printBtn" type="button">📄 Print Logbook</button>

<div id="list"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="edit-modal">
  <div class="edit-modal-content">
    <span class="close">&times;</span>
    <h3>Edit Entry</h3>
    <input id="editDate" type="date">
    <input id="editJob" placeholder="Job">
    <input id="editWork" placeholder="Work">
    <input id="editHours" type="number" placeholder="Hours">
    <select id="editCable">
      <option>Cat5e</option>
      <option>Cat6</option>
      <option>Cat6A</option>
    </select>
    <select id="editTask">
      <option>Cable Installation</option>
      <option>Terminate Outlets Field</option>
      <option>Terminate Outlets Rack</option>
      <option>Patching</option>
      <option>Testing/Certifying</option>
    </select>
    <div class="modal-buttons">
      <button id="saveEditBtn" type="button">✅ Save</button>
      <button id="cancelEditBtn" type="button">❌ Cancel</button>
    </div>
  </div>
</div>

<script>

// ✅ LOAD SAVED DATA
let entries = JSON.parse(localStorage.getItem("logbook")) || [];
let supervisorData = JSON.parse(localStorage.getItem("supervisorData")) || {};
let editingIndex = -1;

// ✅ DARK MODE
document.getElementById("darkModeBtn").onclick = function () {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
};

// ✅ CANVAS SIGNATURE
const canvas = document.getElementById("signatureCanvas");
const ctx = canvas.getContext("2d");
let isDrawing = false;
let signatureImage = supervisorData.signature || null;

// Touch and mouse support
function startDrawing(e) {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineTo(x, y);
  ctx.stroke();
}

function stopDrawing() {
  isDrawing = false;
}

canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseout", stopDrawing);

canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startDrawing(e); });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); stopDrawing(); });

// ✅ CLEAR SIGNATURE
document.getElementById("clearSigBtn").onclick = function () {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  signatureImage = null;
  document.getElementById("sigStatus").innerText = "";
};

// ✅ SAVE SIGNATURE
document.getElementById("saveSigBtn").onclick = function () {
  const supervisorName = document.getElementById("supervisorName").value.trim();
  const licenceNumber = document.getElementById("licenceNumber").value.trim();

  if (!supervisorName || !licenceNumber) {
    showStatus("Enter Supervisor Name and Licence Number", "error");
    return;
  }

  signatureImage = canvas.toDataURL("image/png");
  supervisorData = {
    name: supervisorName,
    licence: licenceNumber,
    signature: signatureImage,
    date: new Date().toISOString()
  };

  localStorage.setItem("supervisorData", JSON.stringify(supervisorData));
  document.getElementById("sigStatus").innerText = "✅ Signature saved!";
};

// ✅ SHOW STATUS MESSAGE
function showStatus(message, type) {
  const msg = document.getElementById("statusMsg");
  msg.innerText = message;
  msg.className = `status-message ${type}`;
  setTimeout(() => {
    msg.className = "status-message";
  }, 3000);
}

// ✅ EXPORT CSV
document.getElementById("exportBtn").onclick = function () {
  if (entries.length === 0) {
    showStatus("No entries to export", "error");
    return;
  }

  let csv = "Date,Job,Work,Cable,Task,Hours\n";
  entries.forEach(e => {
    csv += `"${e.date}","${e.job}","${e.work}","${e.cable}","${e.task}",${e.hours}\n`;
  });

  const link = document.createElement("a");
  link.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  link.download = "logbook_export_" + new Date().toISOString().split("T")[0] + ".csv";
  link.click();
  
  showStatus("CSV exported successfully", "success");
};

// ✅ RESET ALL DATA
document.getElementById("resetBtn").onclick = function () {
  if (confirm("⚠️ ARE YOU SURE? This will delete ALL entries, signature, and data. This cannot be undone!")) {
    if (confirm("Last chance to cancel. Delete EVERYTHING?")) {
      entries = [];
      supervisorData = {};
      signatureImage = null;
      localStorage.removeItem("logbook");
      localStorage.removeItem("supervisorData");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById("supervisorName").value = "";
      document.getElementById("licenceNumber").value = "";
      document.getElementById("sigStatus").innerText = "";
      render();
      showStatus("All data cleared", "success");
    }
  }
};

// ✅ EDIT MODAL
const editModal = document.getElementById("editModal");
const closeBtn = document.querySelector(".close");

closeBtn.onclick = function () {
  editModal.style.display = "none";
};

window.onclick = function (event) {
  if (event.target == editModal) {
    editModal.style.display = "none";
  }
};

// ✅ OPEN EDIT MODAL
function openEditModal(index) {
  editingIndex = index;
  const e = entries[index];
  
  document.getElementById("editDate").value = e.date;
  document.getElementById("editJob").value = e.job;
  document.getElementById("editWork").value = e.work;
  document.getElementById("editHours").value = e.hours;
  document.getElementById("editCable").value = e.cable;
  document.getElementById("editTask").value = e.task;
  
  editModal.style.display = "block";
}

// ✅ SAVE EDIT
document.getElementById("saveEditBtn").onclick = function () {
  const date = document.getElementById("editDate").value;
  const job = document.getElementById("editJob").value;
  const work = document.getElementById("editWork").value;
  const cable = document.getElementById("editCable").value;
  const task = document.getElementById("editTask").value;
  const hours = parseFloat(document.getElementById("editHours").value);

  if (!hours || hours <= 0) {
    showStatus("Enter valid hours", "error");
    return;
  }

  entries[editingIndex] = { date, job, work, cable, task, hours };
  saveData();
  render();
  editModal.style.display = "none";
  showStatus("Entry updated", "success");
};

document.getElementById("cancelEditBtn").onclick = function () {
  editModal.style.display = "none";
};

// ✅ AUTO DATE
window.onload = function () {
  // Load dark mode preference
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark-mode");
  }

  let today = new Date().toISOString().split("T")[0];
  document.getElementById("date").value = today;

  // Load supervisor data if exists
  if (supervisorData.name) {
    document.getElementById("supervisorName").value = supervisorData.name;
    document.getElementById("licenceNumber").value = supervisorData.licence;
    if (supervisorData.signature) {
      const img = new Image();
      img.onload = function () {
        ctx.drawImage(img, 0, 0);
      };
      img.src = supervisorData.signature;
    }
  }

  render();
};

// ✅ SAVE FUNCTION
function saveData() {
  localStorage.setItem("logbook", JSON.stringify(entries));
}

// ✅ GET WEEK TOTALS
function getWeekTotal() {
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  weekStart.setHours(0, 0, 0, 0);

  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  weekEnd.setHours(23, 59, 59, 999);

  let total = 0;
  entries.forEach(e => {
    const entryDate = new Date(e.date);
    if (entryDate >= weekStart && entryDate <= weekEnd) {
      total += e.hours;
    }
  });
  return total;
}

// ✅ ADD ENTRY
document.getElementById("addBtn").onclick = function () {

  let date = document.getElementById("date").value;
  let job = document.getElementById("job").value;
  let work = document.getElementById("work").value;
  let cable = document.getElementById("cable").value;
  let task = document.getElementById("task").value;
  let hours = parseFloat(document.getElementById("hours").value);

  if (!hours || hours <= 0) {
    showStatus("Enter valid hours", "error");
    return;
  }

  entries.push({ date, job, work, cable, task, hours });

  saveData();
  render();
  
  // Clear form
  document.getElementById("job").value = "";
  document.getElementById("work").value = "";
  document.getElementById("hours").value = "";
  
  showStatus("Entry added", "success");
};

// ✅ DISPLAY
function render() {

  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;
  let weekTotal = getWeekTotal();

  entries.forEach(function(e, index) {

    total += e.hours;

    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML =
      "<b>" + e.date + "</b> - " + e.job +
      "<br>" + e.work +
      "<br>" + e.cable + " | " + e.task +
      " | " + e.hours + " hrs";

    const buttonsDiv = document.createElement("div");
    buttonsDiv.className = "entry-buttons";
    
    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️ Edit";
    editBtn.onclick = () => openEditModal(index);
    
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "❌ Delete";
    deleteBtn.onclick = () => deleteEntry(index);
    
    buttonsDiv.appendChild(editBtn);
    buttonsDiv.appendChild(deleteBtn);
    
    div.appendChild(buttonsDiv);
    list.appendChild(div);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("weekHours").innerText = weekTotal;
}

function deleteEntry(index) {

  if (confirm("Delete this entry? This cannot be undone.")) {
    entries.splice(index, 1);
    saveData();
    render();
    showStatus("Entry deleted", "success");
  }
}

// ✅ PRINT
document.getElementById("printBtn").onclick = function () {

  if (!signatureImage) {
    showStatus("Supervisor must sign before printing", "error");
    return;
  }

  let selectedDate = document.getElementById("date").value || new Date().toISOString().split("T")[0];

  function getWeekEnding(dateStr) {
    let d = new Date(dateStr);
    let day = d.getDay();
    let diff = day === 0 ? 0 : 7 - day;
    d.setDate(d.getDate() + diff);
    return d.toISOString().split("T")[0];
  }

  let weekEnding = getWeekEnding(selectedDate);

  let weekStart = new Date(selectedDate);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  let weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  let weeklyTotal = 0;
  let rows = "";
  let total = 0;

  entries.forEach(function(e) {

    total += e.hours;

    let entryDate = new Date(e.date);
    if (entryDate >= weekStart && entryDate <= weekEnd) {
      weeklyTotal += e.hours;
    }

    rows += "<tr>" +
      "<td>" + e.date + "</td>" +
      "<td>" + e.job + "</td>" +
      "<td>" + e.work + "</td>" +
      "<td>" + e.cable + "</td>" +
      "<td>" + e.task + "</td>" +
      "<td>" + e.hours + "</td>" +
      "</tr>";
  });

  let content =
    "<html><body style='font-family:Arial;padding:30px'>" +

    "<h1 style='text-align:center'>CABLING LOGBOOK</h1>" +

    "<p><b>Name:</b> " + document.getElementById("name").value + "</p>" +
    "<p><b>Employer:</b> " + document.getElementById("employer").value + "</p>" +

    "<h3>Total Hours: " + total + " / 360</h3>" +

    "<h3>Work Log</h3>" +

    "<table border='1' style='width:100%;border-collapse:collapse'>" +
    "<tr><th>Date</th><th>Job</th><th>Work</th><th>Cable</th><th>Task</th><th>Hours</th></tr>" +
    rows +
    "</table>" +

    "<br><hr><br>" +

    "<h3>Weekly Sign-Off</h3>" +
    "<p><b>Week Ending:</b> " + weekEnding + "</p>" +
    "<p><b>Total Hours This Week:</b> " + weeklyTotal + "</p>" +

    "<p><b>Supervisor Name:</b> " + supervisorData.name + "</p>" +
    "<p><b>Licence Number:</b> " + supervisorData.licence + "</p>" +
    "<p><b>Signature:</b></p>" +
    "<img src='" + signatureImage + "' style='border:1px solid black;width:250px;height:100px'>" +

    "<br><p><b>Tap Share → Print to save PDF</b></p>" +

    "</body></html>";

  document.open();
  document.write(content);
  document.close();
};

</script>

</body>
</html>
