<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cabling Logbook</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

input, select, button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  font-size: 16px;
}

.entry {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
}

#signatureCanvas {
  border: 2px solid #333;
  display: block;
  margin: 10px 0;
  touch-action: none;
  background: white;
  cursor: crosshair;
  width: 100%;
  max-width: 400px;
}

.signature-section {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  background: #f9f9f9;
}

.button-group {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.button-group button {
  flex: 1;
  width: auto;
}
</style>
</head>

<body>

<h2>Cabling Logbook</h2>

<!-- Details -->
<input id="name" placeholder="Your Name">
<input id="employer" placeholder="Employer">

<hr>

<!-- ✅ Auto date -->
<input id="date" type="date">
<input id="job" placeholder="Job">
<input id="work" placeholder="Work">
<input id="hours" type="number" placeholder="Hours">

<select id="cable">
  <option>Cat5e</option>
  <option>Cat6</option>
  <option>Cat6A</option>
</select>

<select id="task">
  <option>Cable Installation</option>
  <option>Terminate Outlets Field</option>
  <option>Terminate Outlets Rack</option>
  <option>Patching</option>
  <option>Testing/Certifying</option>
</select>

<button id="addBtn" type="button">Add Entry</button>

<h3>Total: <span id="total">0</span></h3>

<!-- ✅ SUPERVISOR SIGNATURE SECTION -->
<div class="signature-section">
  <h3>Supervisor Sign-Off</h3>
  <input id="supervisorName" placeholder="Supervisor Name">
  <input id="licenceNumber" placeholder="Licence Number">
  
  <p><b>Signature:</b></p>
  <canvas id="signatureCanvas" width="400" height="150"></canvas>
  
  <div class="button-group">
    <button id="clearSigBtn" type="button">🔄 Clear</button>
    <button id="saveSigBtn" type="button">✅ Save Signature</button>
  </div>
  <p id="sigStatus"></p>
</div>

<button id="printBtn" type="button">📄 Print Logbook</button>

<div id="list"></div>

<script>

// ✅ LOAD SAVED DATA
let entries = JSON.parse(localStorage.getItem("logbook")) || [];
let supervisorData = JSON.parse(localStorage.getItem("supervisorData")) || {};

// ✅ CANVAS SIGNATURE
const canvas = document.getElementById("signatureCanvas");
const ctx = canvas.getContext("2d");
let isDrawing = false;
let signatureImage = supervisorData.signature || null;

// Touch and mouse support
function startDrawing(e) {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineTo(x, y);
  ctx.stroke();
}

function stopDrawing() {
  isDrawing = false;
}

canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseout", stopDrawing);

canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startDrawing(e); });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); stopDrawing(); });

// ✅ CLEAR SIGNATURE
document.getElementById("clearSigBtn").onclick = function () {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  signatureImage = null;
  document.getElementById("sigStatus").innerText = "";
};

// ✅ SAVE SIGNATURE
document.getElementById("saveSigBtn").onclick = function () {
  const supervisorName = document.getElementById("supervisorName").value.trim();
  const licenceNumber = document.getElementById("licenceNumber").value.trim();

  if (!supervisorName || !licenceNumber) {
    alert("Enter Supervisor Name and Licence Number");
    return;
  }

  signatureImage = canvas.toDataURL("image/png");
  supervisorData = {
    name: supervisorName,
    licence: licenceNumber,
    signature: signatureImage,
    date: new Date().toISOString()
  };

  localStorage.setItem("supervisorData", JSON.stringify(supervisorData));
  document.getElementById("sigStatus").innerText = "✅ Signature saved!";
};

// ✅ AUTO DATE
window.onload = function () {
  let today = new Date().toISOString().split("T")[0];
  document.getElementById("date").value = today;

  // Load supervisor data if exists
  if (supervisorData.name) {
    document.getElementById("supervisorName").value = supervisorData.name;
    document.getElementById("licenceNumber").value = supervisorData.licence;
    if (supervisorData.signature) {
      const img = new Image();
      img.onload = function () {
        ctx.drawImage(img, 0, 0);
      };
      img.src = supervisorData.signature;
    }
  }

  render(); // ✅ load saved entries on start
};

// ✅ SAVE FUNCTION
function saveData() {
  localStorage.setItem("logbook", JSON.stringify(entries));
}

// ✅ ADD ENTRY
document.getElementById("addBtn").onclick = function () {

  let date = document.getElementById("date").value;
  let job = document.getElementById("job").value;
  let work = document.getElementById("work").value;
  let cable = document.getElementById("cable").value;
  let task = document.getElementById("task").value;
  let hours = parseFloat(document.getElementById("hours").value);

  if (!hours || hours <= 0) {
    alert("Enter valid hours");
    return;
  }

  entries.push({ date, job, work, cable, task, hours });

  saveData();   // ✅ autosave
  render();
};

// ✅ DISPLAY
function render() {

  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  entries.forEach(function(e, index) {

    total += e.hours;

    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML =
      "<b>" + e.date + "</b> - " + e.job +
      "<br>" + e.work +
      "<br>" + e.cable + " | " + e.task +
      " | " + e.hours + " hrs" +
      "<br><button onclick='deleteEntry(" + index + ")'>❌ Delete</button>";

    list.appendChild(div);
  });

  document.getElementById("total").innerText = total;
}

function deleteEntry(index) {

  // remove 1 item at position index
  entries.splice(index, 1);

  saveData(); // ✅ keep autosave updated
  render();   // ✅ refresh screen
}

// ✅ PRINT
document.getElementById("printBtn").onclick = function () {

  if (!signatureImage) {
    alert("Supervisor must sign before printing");
    return;
  }

  let selectedDate = document.getElementById("date").value || new Date().toISOString().split("T")[0];

  function getWeekEnding(dateStr) {
    let d = new Date(dateStr);
    let day = d.getDay();
    let diff = day === 0 ? 0 : 7 - day;
    d.setDate(d.getDate() + diff);
    return d.toISOString().split("T")[0];
  }

  let weekEnding = getWeekEnding(selectedDate);

  let weekStart = new Date(selectedDate);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  let weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  let weeklyTotal = 0;
  let rows = "";
  let total = 0;

  entries.forEach(function(e) {

    total += e.hours;

    let entryDate = new Date(e.date);
    if (entryDate >= weekStart && entryDate <= weekEnd) {
      weeklyTotal += e.hours;
    }

    rows += "<tr>" +
      "<td>" + e.date + "</td>" +
      "<td>" + e.job + "</td>" +
      "<td>" + e.work + "</td>" +
      "<td>" + e.cable + "</td>" +
      "<td>" + e.task + "</td>" +
      "<td>" + e.hours + "</td>" +
      "</tr>";
  });

  let content =
    "<html><body style='font-family:Arial;padding:30px'>" +

    "<h1 style='text-align:center'>CABLING LOGBOOK</h1>" +

    "<p><b>Name:</b> " + document.getElementById("name").value + "</p>" +
    "<p><b>Employer:</b> " + document.getElementById("employer").value + "</p>" +

    "<h3>Total Hours: " + total + " / 360</h3>" +

    "<h3>Work Log</h3>" +

    "<table border='1' style='width:100%;border-collapse:collapse'>" +
    "<tr><th>Date</th><th>Job</th><th>Work</th><th>Cable</th><th>Task</th><th>Hours</th></tr>" +
    rows +
    "</table>" +

    "<br><hr><br>" +

    "<h3>Weekly Sign-Off</h3>" +
    "<p><b>Week Ending:</b> " + weekEnding + "</p>" +
    "<p><b>Total Hours This Week:</b> " + weeklyTotal + "</p>" +

    "<p><b>Supervisor Name:</b> " + supervisorData.name + "</p>" +
    "<p><b>Licence Number:</b> " + supervisorData.licence + "</p>" +
    "<p><b>Signature:</b></p>" +
    "<img src='" + signatureImage + "' style='border:1px solid black;width:250px;height:100px'>" +

    "<br><p><b>Tap Share → Print to save PDF</b></p>" +

    "</body></html>";

  // ✅ THIS IS THE KEY CHANGE (Safari works properly)
  document.open();
  document.write(content);
  document.close();
};

</script>

</body>
</html>
